<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- Velas japonesas (candlesticks) -->
  <!-- Vela 1 (baja) -->
  <rect x="10" y="30" width="6" height="18" rx="1" fill="#ef4444"/>
  <line x1="13" y1="26" x2="13" y2="30" stroke="#ef4444" stroke-width="2"/>
  <line x1="13" y1="48" x2="13" y2="52" stroke="#ef4444" stroke-width="2"/>

  <!-- Vela 2 (sube) -->
  <rect x="22" y="22" width="6" height="20" rx="1" fill="#22c55e"/>
  <line x1="25" y1="17" x2="25" y2="22" stroke="#22c55e" stroke-width="2"/>
  <line x1="25" y1="42" x2="25" y2="47" stroke="#22c55e" stroke-width="2"/>

  <!-- Vela 3 (baja) -->
  <rect x="34" y="28" width="6" height="14" rx="1" fill="#ef4444"/>
  <line x1="37" y1="23" x2="37" y2="28" stroke="#ef4444" stroke-width="2"/>
  <line x1="37" y1="42" x2="37" y2="46" stroke="#ef4444" stroke-width="2"/>

  <!-- Vela 4 (sube, grande) -->
  <rect x="46" y="16" width="6" height="24" rx="1" fill="#22c55e"/>
  <line x1="49" y1="11" x2="49" y2="16" stroke="#22c55e" stroke-width="2"/>
  <line x1="49" y1="40" x2="49" y2="45" stroke="#22c55e" stroke-width="2"/>

  <!-- Línea base -->
  <line x1="8" y1="55" x2="56" y2="55" stroke="#475569" stroke-width="1.5"/>
</svg>
