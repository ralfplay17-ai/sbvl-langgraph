services:
  langflow:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "7860"
    environment:
      - PORT=7860
    restart: unless-stopped
    networks:
      - tunnel-net

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    expose:
      - "8501"
    environment:
      - PORT=8501
    restart: unless-stopped
    networks:
      - tunnel-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - langflow
      - streamlit
    networks:
      - tunnel-net

networks:
  tunnel-net:
    driver: bridge
